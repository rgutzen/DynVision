# see snakemake profile documentation for details: https://snakemake.readthedocs.io/en/stable/executing/cli.html#profiles
# NOTE: runtime values are in seconds (plugin divides by 60 for SLURM --time in minutes)

# DON'T CHANGE
executor: slurm

# CHANGE WITH CARE
restart-times: "1"
max-jobs-per-second: "30"
max-status-checks-per-second: "2"
local-cores: 2
latency-wait: "90"
use-conda: "False"
use-singularity: "False"
jobs: "200"
printshellcmds: "True"
keep-going: "True"
rerun-incomplete: "True"
rerun-triggers:
  - mtime
nolock: "True"

# CHANGE AS NEEDED
slurm-logdir: "/home/rg5022/Modeling_Dynamical_Vision/logs/slurm"
slurm-keep-successful-logs: false
slurm-delete-logfiles-older-than: 2 # specify the number of days

default-resources:
  runtime: 1800  # 30 minutes
  mem_mb: 32000  # 32 GB
  disk_mb: 1000  # 1 GB
  cpus_per_task: 16
  cpu: 16
  slurm_account: "torch_pr_628_general"

#############################
# dynamic resources keywords:
#############################
# max(1.5 * input.size_mb, 100)
# attempt * 200

set-resources:

  init_model:
    mem: 16G
    runtime: 9600  # 160 minutes
    cpus_per_task: 16
    cpu: 16
    slurm_account: "torch_pr_628_general"


  test_model:
    mem: 80G * attempt
    runtime: 120 * attempt  # 120 minutes per attempt (dynamic expressions are in minutes, not seconds)
    cpus_per_task: 16
    disk_mb: 30000  # ~30 GB per test_responses.pt; throttle with --resources disk_mb=<total_budget>
    slurm_account: "torch_pr_628_general"
    slurm_extra: "'--gpus-per-node=1'"

  train_model:
    mem: 80G
    runtime: 48000  # 800 minutes (~13 hours)
    cpus_per_task: 16
    slurm_account: "torch_pr_628_general"
    slurm_extra: "'--gpus-per-node=h200:1'"

  train_model_distributed:
    mem: 120G
    disk: 400G
    runtime: 360000  # 6000 minutes (100 hours)
    cpus_per_task: 16
    nodes: 1
    slurm_account: "torch_pr_628_general"
    slurm_extra: "'--gpus-per-node=h200:4 --ntasks-per-node=4'"

  symlink_data_subsets:
    mem: 32G
    runtime: 600  # 10 minutes
    cpus_per_task: 4
    slurm_account: "torch_pr_628_general"

  symlink_data_groups:
    mem: 32G
    runtime: 600  # 10 minutes
    cpus_per_task: 4
    slurm_account: "torch_pr_628_general"

  build_ffcv_datasets:
    mem: 120G
    runtime: 7200  # 120 minutes
    cpu: 32
    cpus_per_task: 32
    slurm_account: "torch_pr_628_general"

  process_test_data:
    mem: 120G
    runtime: 21600  # 360 minutes (6 hours)
    cpus_per_task: 16
    slurm_account: "torch_pr_628_general"

  process_single_test:
    mem: 120G
    runtime: 1800  # 30 minutes
    cpus_per_task: 16
    slurm_account: "torch_pr_628_general"

  aggregate_test_results:
    mem: 64G
    runtime: 900  # 15 minutes
    cpus_per_task: 4
    slurm_account: "torch_pr_628_general"

  best_checkpoint_to_statedict:
    mem: 16G
    runtime: 900  # 15 minutes
    cpus_per_task: 4
    slurm_account: "torch_pr_628_general"

  intermediate_checkpoint_to_statedict:
    mem: 16G
    runtime: 900  # 15 minutes
    slurm_account: "torch_pr_628_general"
    cpus_per_task: 4

  plot_unrolling:
    mem: 120G
    runtime: 3600  # 60 minutes
    cpus_per_task: 16
    slurm_account: "torch_pr_628_general"