{#-
  DynVision logo partial — displays black-on-light logo in light mode and
  white-on-dark logo in dark mode. Works via CSS media-query <picture> element.
-#}
<picture>
  <source srcset="{{ config.theme.logo | replace('logo.svg', 'logo_white.svg') | url }}" media="(prefers-color-scheme: dark)">
  <img src="{{ config.theme.logo | replace('logo.svg', 'logo_black.svg') | url }}" alt="logo">
</picture>
